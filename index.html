<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>장마감 한눈에 보기</title>

  <!-- 기존 style.css가 있으면 그대로 쓰되, 아래 스타일로 레이아웃/토글만 보강 -->
  <link rel="stylesheet" href="./style.css" />
  <style>
    :root{
      --bg: #0b1220;
      --panel: #0f1a2f;
      --panel2:#101f3a;
      --text:#e6eefc;
      --muted:#93a4c7;
      --border: rgba(255,255,255,.08);
      --shadow: 0 10px 30px rgba(0,0,0,.25);
      --pill: rgba(255,255,255,.06);
      --pos:#ff5a5f;
      --neg:#4da3ff;
      --neu:#aab4c8;
      --accent:#6aa8ff;
    }
    html[data-theme="light"]{
      --bg:#f6f8fc;
      --panel:#ffffff;
      --panel2:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border: rgba(2,6,23,.10);
      --shadow: 0 10px 30px rgba(2,6,23,.08);
      --pill: rgba(2,6,23,.06);
      --pos:#d32f2f;
      --neg:#1565c0;
      --neu:#475569;
      --accent:#1d4ed8;
    }
    body{ background:var(--bg); color:var(--text); margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", AppleSDGothicNeo, "Malgun Gothic", sans-serif; }
    .wrap{ max-width: 1280px; margin: 0 auto; padding: 22px 18px 60px; }
    .topbar{ display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .title{ display:flex; flex-direction:column; gap:6px; }
    .title h1{ margin:0; font-size:24px; letter-spacing:-.02em; }
    .subtitle{ color:var(--muted); font-size:13px; }
    .controls{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .tabs{ display:flex; gap:8px; }
    .tabbtn{
      border:1px solid var(--border); background:var(--panel); color:var(--text);
      padding:10px 14px; border-radius:12px; cursor:pointer; box-shadow:var(--shadow);
      font-weight:700; letter-spacing:-.01em;
    }
    .tabbtn[aria-pressed="true"]{ outline:2px solid rgba(106,168,255,.35); }
    .toggle{
      border:1px solid var(--border); background:var(--panel); color:var(--text);
      padding:10px 12px; border-radius:12px; cursor:pointer; box-shadow:var(--shadow);
      display:flex; align-items:center; gap:8px; font-weight:700;
    }
    .grid2{ display:grid; grid-template-columns: 1.05fr .95fr; gap:14px; margin-top:14px; }
    .grid2b{ display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-top:14px; }
    @media (max-width: 980px){ .grid2{ grid-template-columns:1fr; } .grid2b{ grid-template-columns:1fr; } }
    .card{
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border:1px solid var(--border); border-radius:22px; padding:18px 18px 16px;
      box-shadow:var(--shadow);
    }
    .card h2{ margin:0 0 12px 0; font-size:18px; letter-spacing:-.02em; }
    .card h3{ margin:0 0 12px 0; font-size:16px; letter-spacing:-.02em; color:var(--muted); font-weight:800; }
    .metricRow{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; padding:10px 0; border-top:1px dashed var(--border); }
    .metricRow:first-of-type{ border-top:none; padding-top:2px; }
    .label{ color:var(--muted); font-weight:800; letter-spacing:-.01em; }
    .value{ font-weight:900; font-size:28px; letter-spacing:-.02em; }
    .subvalue{ color:var(--muted); font-weight:800; }
    .pills{ display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }
    .pill{
      background:var(--pill); border:1px solid var(--border);
      padding:10px 12px; border-radius:999px; font-weight:900;
      display:flex; gap:10px; align-items:center;
    }
    .pill span{ color:var(--muted); font-weight:800; }
    .pos{ color:var(--pos); } .neg{ color:var(--neg); } .neu{ color:var(--neu); }
    .imgBox{ width:100%; overflow:hidden; border-radius:18px; border:1px solid var(--border); background:rgba(0,0,0,.08); }
    .imgBox img{ width:100%; display:block; }
    .imgNote{ margin-top:10px; color:var(--muted); font-size:12px; }
    .list{ display:flex; flex-direction:column; gap:10px; }
    .listItem{
      display:flex; justify-content:space-between; gap:12px; align-items:center;
      padding:14px 14px; border-radius:18px; border:1px solid var(--border); background:rgba(255,255,255,.03);
    }
    html[data-theme="light"] .listItem{ background:rgba(2,6,23,.03); }
    .liLeft{ display:flex; flex-direction:column; gap:4px; }
    .liName{ font-weight:950; font-size:20px; letter-spacing:-.02em; }
    .liMeta{ color:var(--muted); font-weight:800; }
    .badge{
      background:var(--pill); border:1px solid var(--border);
      padding:10px 14px; border-radius:999px; font-weight:950; min-width:92px; text-align:right;
    }
    .sectionTitle{ margin-top:18px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .sectionTitle h2{ margin:0; font-size:18px; }
    .miniTabs{ display:flex; gap:8px; }
    .miniBtn{
      border:1px solid var(--border); background:transparent; color:var(--text);
      padding:8px 10px; border-radius:12px; cursor:pointer; font-weight:900;
    }
    .miniBtn[aria-pressed="true"]{ background:var(--pill); }
    .muted{ color:var(--muted); font-weight:800; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1 id="title-date">장마감 스냅샷</h1>
        <div class="subtitle" id="subtitle">로딩중…</div>
      </div>

      <div class="controls">
        <div class="tabs" role="tablist" aria-label="market">
          <button class="tabbtn" id="tab-kospi" aria-pressed="true">KOSPI</button>
          <button class="tabbtn" id="tab-kosdaq" aria-pressed="false">KOSDAQ</button>
        </div>

        <button class="toggle" id="theme-toggle" aria-label="theme toggle">
          <span id="theme-icon">🌙</span>
          <span id="theme-text">Dark</span>
        </button>
      </div>
    </div>

    <!-- Row 1: Snapshot + Intraday -->
    <div class="grid2">
      <section class="card" aria-label="market snapshot">
        <h2 id="market-name">KOSPI</h2>

        <div class="metricRow">
          <div class="label">지수</div>
          <div class="value" id="close">—</div>
        </div>

        <div class="metricRow">
          <div class="label">거래대금</div>
          <div class="subvalue" id="turnover">—</div>
        </div>

        <div class="metricRow">
          <div class="label">투자자 매매 (순매수)</div>
          <div class="pills">
            <div class="pill"><span>외국인</span><b id="foreign">—</b></div>
            <div class="pill"><span>기관</span><b id="institution">—</b></div>
            <div class="pill"><span>개인</span><b id="individual">—</b></div>
          </div>
        </div>

        <div class="metricRow">
          <div class="label">시그널</div>
          <div class="pills">
            <div class="pill"><span>외국인</span><b id="sig-foreign">—</b></div>
            <div class="pill"><span>기관</span><b id="sig-institution">—</b></div>
            <div class="pill"><span>개인</span><b id="sig-individual">—</b></div>
          </div>
        </div>
      </section>

      <section class="card" aria-label="intraday chart">
        <div class="sectionTitle">
          <h2>지수 당일 흐름</h2>
          <div class="muted">* 이미지 파일이 없으면 자동으로 안내 표시</div>
        </div>
        <div class="imgBox">
          <img id="intraday-img" alt="intraday chart" />
        </div>
        <div class="imgNote" id="intraday-note"></div>
      </section>
    </div>

    <!-- Row 2: Treemap full width -->
    <section class="card" style="margin-top:14px;">
      <div class="sectionTitle">
        <h2 id="treemap-title">시총 TOP10 등락 (Treemap)</h2>
        <div class="muted">상승=빨강 · 하락=파랑 · 진하기=강도</div>
      </div>
      <div class="imgBox">
        <img id="treemap-img" alt="treemap" />
      </div>
    </section>

    <!-- Row 3: Top10 list + Upjong (same row) -->
    <div class="grid2b">
      <section class="card" aria-label="top10 list">
        <div class="sectionTitle">
          <h2>시총 TOP10 리스트</h2>
          <div class="muted">등락률 · 시총 · 종가</div>
        </div>
        <div class="list" id="top10-list"></div>
      </section>

      <section class="card" aria-label="upjong top/bottom">
        <div class="sectionTitle">
          <h2>업종 상·하위 3</h2>
          <div class="muted">네이버 업종별 시세</div>
        </div>
        <div class="grid2b" style="margin-top:0;">
          <div>
            <h3>상위</h3>
            <div class="list" id="upjong-top"></div>
          </div>
          <div>
            <h3>하위</h3>
            <div class="list" id="upjong-bottom"></div>
          </div>
        </div>
        <div class="imgNote" id="upjong-note"></div>
      </section>
    </div>

    <!-- Row 4: Trend charts -->
    <section class="card" style="margin-top:14px;">
      <div class="sectionTitle">
        <h2>추이 차트</h2>
        <div class="miniTabs" role="tablist" aria-label="range">
          <button class="miniBtn" id="range-1y" aria-pressed="true">1Y</button>
          <button class="miniBtn" id="range-all" aria-pressed="false">ALL</button>
        </div>
      </div>

      <div class="grid2b">
        <div>
          <h3>거래대금 vs 지수</h3>
          <div class="imgBox"><img id="chart-turnover" alt="turnover chart" /></div>
          <div class="imgNote" id="chart-turnover-note"></div>
        </div>

        <div>
          <h3>투자자 순매수 비중(추이)</h3>
          <div class="imgBox"><img id="chart-investor" alt="investor chart" /></div>
          <div class="imgNote" id="chart-investor-note"></div>
        </div>
      </div>
    </section>

  </div>

  <script src="./app.js" defer></script>
</body>
</html>
