name: KRX Flow Daily

on:
  schedule:
    - cron: "30 9 * * *"   # 18:30 KST (cron is UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pykrx squarify matplotlib pandas

      - name: Run
        run: python scripts/run_daily.py

      - name: Build dashboard
        run: python scripts/build_dashboard_close.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/derived/dashboard \
                  data/derived/charts \
                  data/history/liquidity_daily.csv \
                  data/derived/*.csv \
                  data/derived/*.json || true
                  add web || true
          git commit -m "Daily dashboard update" || echo "No changes"
          git pull --rebase || true
          git push
